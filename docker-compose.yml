services:
  hands:
    build:
      context: .
      dockerfile: Dockerfile
    image: parix:local
    command: ["python3", "-m", "hands.main"]
    environment:
      PARIX_WS_HOST: 0.0.0.0
      PARIX_WS_PORT: 8765
      PYTHONUNBUFFERED: "1"
    ports:
      - "8765:8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.create_connection(('127.0.0.1',8765),2); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5

  atrium:
    image: parix:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "atrium/dist/index.js"]
    depends_on:
      hands:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HANDS_WS_URL: ws://hands:8765
      PARIX_DB_PATH: /app/data/memory.db
    env_file:
      - .env
    ports:
      - "8766:8766"
    volumes:
      - parix-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8766/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  aegis:
    image: parix:local
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "scripts/serve-aegis.mjs"]
    depends_on:
      atrium:
        condition: service_healthy
    environment:
      AEGIS_UI_PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  parix-data:
