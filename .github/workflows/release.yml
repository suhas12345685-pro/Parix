name: Release Pipeline

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r hands/requirements-dev.txt
      - run: npm run build:all
      - run: npm run lint
      - run: npm test
      - run: npm run skills:validate
      - run: npm run test:hands
      - run: npm run test:hands:compile
      - run: npm run test:e2e
      - run: npm audit --audit-level=high

  docker:
    name: Build and push Docker image (${{ matrix.component }})
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [atrium, hands]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  windows:
    name: Build Windows distributable
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        shell: pwsh
        run: |
          $stage = "dist-staging\parix"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $items = @(
            "atrium", "hands", "shared", "hatchery", "aegis", "skills",
            "deploy", "package.json", "package-lock.json",
            "ecosystem.config.js", "install.ps1", ".env.example",
            "LICENSE", "README.md", "CHANGELOG.md", "ROADMAP.md"
          )
          foreach ($item in $items) {
            if (Test-Path $item) {
              Copy-Item -Path $item -Destination $stage -Recurse -Force
            }
          }

      - name: Optional Authenticode signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)) {
            Write-Host "::warning::WINDOWS_SIGNING_CERT_BASE64 not set; Windows distributable will be unsigned."
            exit 0
          }
          $certPath = "$env:RUNNER_TEMP\parix-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_SIGNING_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Get-ChildItem "dist-staging\parix" -Recurse -Filter *.ps1 | ForEach-Object {
            Set-AuthenticodeSignature -FilePath $_.FullName -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
          }
          Remove-Item $certPath -Force

      - name: Package Windows zip
        shell: pwsh
        run: Compress-Archive -Path "dist-staging\parix\*" -DestinationPath "parix-${{ github.ref_name }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: parix-windows-x64
          path: parix-*-windows-x64.zip
          if-no-files-found: error

  macos:
    name: Build macOS distributable
    needs: validate
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        run: |
          mkdir -p dist-staging/parix
          cp -R atrium hands shared hatchery aegis skills deploy dist-staging/parix/
          cp package.json package-lock.json ecosystem.config.js install.sh .env.example dist-staging/parix/
          cp LICENSE README.md CHANGELOG.md ROADMAP.md dist-staging/parix/

      - name: Optional codesigning
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            echo "::warning::APPLE_CERTIFICATE_BASE64 not set; macOS distributable will be unsigned."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/parix-apple.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/parix-signing.keychain-db"
          printf "%s" "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null || \
            printf "%s" "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p ci-pass "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p ci-pass "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci-pass "$KEYCHAIN_PATH"
          IDENTITY="${APPLE_SIGNING_IDENTITY:-Developer ID Application}"
          codesign --force --options runtime --sign "$IDENTITY" dist-staging/parix/install.sh
          rm "$CERT_PATH"

      - name: Package macOS tarball
        run: tar -czf "parix-${{ github.ref_name }}-macos.tar.gz" -C dist-staging parix

      - name: Optional notarization
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -z "$APPLE_APP_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_ID" ]; then
            echo "::warning::Apple notarization secrets not set; macOS distributable will be unnotarized."
            exit 0
          fi
          xcrun notarytool submit "parix-${{ github.ref_name }}-macos.tar.gz" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - uses: actions/upload-artifact@v4
        with:
          name: parix-macos
          path: parix-*-macos.tar.gz
          if-no-files-found: error

  linux:
    name: Build Linux distributables
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        run: |
          mkdir -p dist-staging/parix
          cp -R atrium hands shared hatchery aegis skills deploy dist-staging/parix/
          cp package.json package-lock.json ecosystem.config.js install.sh .env.example dist-staging/parix/
          cp LICENSE README.md CHANGELOG.md ROADMAP.md dist-staging/parix/

      - name: Package Linux tarball
        run: tar -czf "parix-${{ github.ref_name }}-linux-x64.tar.gz" -C dist-staging parix

      - name: Build Linux AppImage
        run: bash deploy/linux/build-appimage.sh "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: parix-linux-x64
          path: |
            parix-*-linux-x64.tar.gz
            parix-*-linux-x64.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [docker, windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA-256 checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.AppImage" \) \
            -exec sha256sum {} \; | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Prepare release notes
        run: |
          notes=".github/RELEASE-${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            cp "$notes" RELEASE_NOTES.md
          else
            {
              echo "# Parix ${GITHUB_REF_NAME}"
              echo
              echo "## Changes"
              git log "$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo HEAD~10)"..HEAD \
                --pretty=format:"- %s (%h)"
            } > RELEASE_NOTES.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: Parix ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/parix-*.zip
            artifacts/**/parix-*.tar.gz
            artifacts/**/parix-*.AppImage
            artifacts/SHA256SUMS.txt
          fail_on_unmatched_files: true
