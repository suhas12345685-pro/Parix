name: Release Binaries

# Builds per-OS distributables and attaches them to the GitHub Release that
# the existing release.yml just created. Signing / notarization steps run
# only when the corresponding secrets are present; they no-op (with a
# warning) on forks and on this repo until the certs from ROADMAP.md D5
# land.
#
# Inputs (all optional; missing secrets cause that step to be skipped):
#   WINDOWS_SIGNING_CERT_BASE64  — base64-encoded .pfx
#   WINDOWS_SIGNING_PASSWORD     — password for the .pfx
#   APPLE_CERTIFICATE_BASE64     — base64-encoded p12 from the Apple
#                                  Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD   — password for the p12
#   APPLE_APP_PASSWORD           — app-specific password for notarytool
#   APPLE_TEAM_ID                — Apple Developer team ID
#   APPLE_ID                     — Apple ID email for notarytool

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Windows: zip + Authenticode sign (if cert present) ─────────────
  windows:
    name: Windows distributable
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        shell: pwsh
        run: |
          $stage = "dist-staging\parix"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          $copy = @(
            "atrium", "hands", "shared", "hatchery", "aegis", "skills",
            "deploy", "shared", "package.json", "package-lock.json",
            "ecosystem.config.js", "install.ps1", ".env.example",
            "LICENSE", "README.md", "CHANGELOG.md", "ROADMAP.md"
          )
          foreach ($item in $copy) {
            if (Test-Path $item) {
              Copy-Item -Path $item -Destination $stage -Recurse -Force
            }
          }

      - name: Sign install.ps1 (Authenticode)
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}")
          $certPath = "$env:RUNNER_TEMP\parix-cert.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $pwd = ConvertTo-SecureString "${{ secrets.WINDOWS_SIGNING_PASSWORD }}" -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $pwd
          Set-AuthenticodeSignature `
            -FilePath "dist-staging\parix\install.ps1" `
            -Certificate $cert `
            -TimestampServer "http://timestamp.digicert.com"
          Remove-Item $certPath -Force

      - name: Warn if signing skipped
        if: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 == '' }}
        run: echo "::warning::WINDOWS_SIGNING_CERT_BASE64 not set — distributable is unsigned. See ROADMAP.md Phase 2.1."

      - name: Zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "dist-staging\parix\*" -DestinationPath "parix-$tag-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: parix-windows-x64
          path: parix-*-windows-x64.zip
          if-no-files-found: error

  # ─── macOS: tarball + codesign + notarize (if cert present) ─────────
  macos:
    name: macOS distributable
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        run: |
          mkdir -p dist-staging/parix
          cp -R atrium hands shared hatchery aegis skills deploy dist-staging/parix/
          cp package.json package-lock.json ecosystem.config.js install.sh .env.example dist-staging/parix/
          cp LICENSE README.md CHANGELOG.md ROADMAP.md dist-staging/parix/

      - name: Import signing identity
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        env:
          CERT_B64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_B64" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci-pass /tmp/build.keychain
          security default-keychain -s /tmp/build.keychain
          security unlock-keychain -p ci-pass /tmp/build.keychain
          security import /tmp/cert.p12 -k /tmp/build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci-pass /tmp/build.keychain
          rm /tmp/cert.p12

      - name: Codesign distributable
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
        run: |
          # Sign the install script (we'd sign a .app bundle here once one
          # exists — Phase 2.2 in ROADMAP.md).
          codesign --force --options runtime --sign "Developer ID Application" dist-staging/parix/install.sh

      - name: Notarize
        if: ${{ secrets.APPLE_APP_PASSWORD != '' }}
        env:
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          TAG="${{ github.ref_name }}"
          tar -czf "parix-$TAG-macos.tar.gz" -C dist-staging parix
          xcrun notarytool submit "parix-$TAG-macos.tar.gz" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Warn if signing/notarization skipped
        if: ${{ secrets.APPLE_CERTIFICATE_BASE64 == '' }}
        run: echo "::warning::APPLE_CERTIFICATE_BASE64 not set — distributable is unsigned and unnotarized. See ROADMAP.md Phase 2.2."

      - name: Tar (if not already from notarization step)
        run: |
          TAG="${{ github.ref_name }}"
          if [ ! -f "parix-$TAG-macos.tar.gz" ]; then
            tar -czf "parix-$TAG-macos.tar.gz" -C dist-staging parix
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: parix-macos
          path: parix-*-macos.tar.gz
          if-no-files-found: error

  # ─── Linux: AppImage + tarball ─────────────────────────────────────
  linux:
    name: Linux distributable
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y libfuse2
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis

      - name: Stage distributable
        run: |
          mkdir -p dist-staging/parix
          cp -R atrium hands shared hatchery aegis skills deploy dist-staging/parix/
          cp package.json package-lock.json ecosystem.config.js install.sh .env.example dist-staging/parix/
          cp LICENSE README.md CHANGELOG.md ROADMAP.md dist-staging/parix/

      - name: Tarball
        run: |
          TAG="${{ github.ref_name }}"
          tar -czf "parix-$TAG-linux-x64.tar.gz" -C dist-staging parix

      - name: Build AppImage
        run: bash deploy/linux/build-appimage.sh "${{ github.ref_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: parix-linux-x64
          path: |
            parix-*-linux-x64.tar.gz
            parix-*-linux-x64.AppImage
          if-no-files-found: error

  # ─── Attach to GitHub Release ───────────────────────────────────────
  attach:
    name: Attach to release
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA-256 manifest
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.AppImage" \) \
            -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/parix-*.zip
            artifacts/**/parix-*.tar.gz
            artifacts/**/parix-*.AppImage
            artifacts/SHA256SUMS.txt
          fail_on_unmatched_files: false
