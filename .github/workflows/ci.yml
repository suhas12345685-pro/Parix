name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run build --workspace=atrium
      - run: npm run build --workspace=hatchery
      - run: npm run build --workspace=aegis
      - run: npm test --workspace=atrium

      # Python smoke tests — accessibility backends are platform-specific.
      # macOS/Linux/Windows each load a different native module via the
      # `_detect_backend()` dispatch; the suite verifies the dispatch path
      # without requiring the native libs.
      - name: Install Python test deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pillow mss
      - name: Run Python tests
        shell: bash
        run: |
          python -m pytest \
            hands/tests/test_a11y_poller.py \
            hands/tests/test_accessibility.py \
            hands/tests/test_vision_gemini.py \
            hands/tests/test_platform.py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build --workspace=shared
      - run: npm run test:coverage
      - run: npm run coverage:badge
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: atrium-coverage
          path: |
            atrium/coverage
            docs/assets/coverage.svg
      - name: Coverage summary
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const summary = require('./atrium/coverage/coverage-summary.json').total;
          const rows = ['### Coverage', '', '| Metric | Percent |', '| --- | ---: |'];
          for (const key of ['lines', 'statements', 'functions', 'branches']) {
            rows.push(`| ${key} | ${summary[key].pct}% |`);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, rows.join('\n') + '\n');
          NODE

  e2e:
    name: E2E Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install websockets mss psutil
      - run: npm run build --workspace=shared
      - run: npm run test:e2e
      - name: Upload e2e diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            data/*.log
            .parix-e2e
